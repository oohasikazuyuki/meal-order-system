services:
  nginx:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/html
    depends_on:
      - backend
      - frontend
    networks:
      - meal_network

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      KAMAHO_BASE_URL: ${KAMAHO_BASE_URL}
      KAMAHO_LOGIN_ACCOUNT: ${KAMAHO_LOGIN_ACCOUNT}
      KAMAHO_LOGIN_PASSWORD: ${KAMAHO_LOGIN_PASSWORD}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b-instruct-q4_K_S}
      AI_PUBLIC_ENABLED: ${AI_PUBLIC_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3-4b:free}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-meal-order-system}
    # 起動時に composer install → php-fpm を実行
    command: >
      sh -c "
        cd /var/www/html &&
        composer install --no-interaction --no-dev --optimize-autoloader &&
        mkdir -p tmp/cache/models tmp/cache/persistent tmp/sessions logs &&
        chmod -R 777 tmp logs &&
        php-fpm
      "
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - meal_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${WEB_PORT:-80}/api
      NEXT_PUBLIC_AI_PUBLIC_ENABLED: ${NEXT_PUBLIC_AI_PUBLIC_ENABLED:-false}
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "mkdir -p /app/.next && [ -f /app/.next/prerender-manifest.json ] || printf '%s' '{\"version\":4,\"routes\":{},\"dynamicRoutes\":{},\"notFoundRoutes\":[],\"preview\":{\"previewModeId\":\"dev-preview-mode-id\",\"previewModeSigningKey\":\"dev-preview-signing-key\",\"previewModeEncryptionKey\":\"dev-preview-encryption-key\"}}' > /app/.next/prerender-manifest.json; npm run dev"
    networks:
      - meal_network

  db:
    image: mysql:8.0
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Tokyo
    command: --default-time-zone='+09:00'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meal_network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - meal_network

networks:
  meal_network:
    driver: bridge

volumes:
  db_data:
  frontend_node_modules:
  ollama_data:
