name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api
          NEXT_PUBLIC_AI_PUBLIC_ENABLED: "false"

  backend:
    name: Backend Composer Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
          extensions: intl, mbstring, dom, simplexml, xml, xmlreader, xmlwriter, zip

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --optimize-autoloader

      - name: Run PHPUnit tests
        run: php vendor/bin/phpunit --no-coverage

  migrate:
    name: DB Migration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: meal_order_test
          MYSQL_USER: meal_user
          MYSQL_PASSWORD: meal_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
          extensions: pdo_mysql, intl, mbstring, dom, simplexml, xml, xmlreader, xmlwriter, zip

      - name: Install dependencies
        run: composer install --no-interaction --no-dev --optimize-autoloader

      - name: Prepare cache directories
        run: mkdir -p tmp/cache/models tmp/cache/persistent tmp/sessions logs

      - name: Run migrations
        run: php migrate.php
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: meal_order_test
          DB_USER: meal_user
          DB_PASS: meal_pass

  docker-config:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
